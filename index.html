<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muacloud 导航页</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    overflow:hidden;

    background: linear-gradient(-45deg,#0f172a,#1e293b,#0f766e,#1d4ed8);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.card{
    width:90%;
    max-width:560px;

    background:rgba(255,255,255,.12);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.2);

    border-radius:24px;

    padding:40px 30px;

    text-align:center;

    box-shadow:
        0 8px 32px rgba(0,0,0,.25);
}

.logo{
    font-size:40px;
    font-weight:700;
    color:#fff;
    margin-bottom:20px;
}

.guide-box{
    background:rgba(255,255,255,.08);
    border-radius:18px;
    padding:22px;
    margin-bottom:28px;
    line-height:1.9;
}

.guide-title{
    color:#fff;
    font-size:20px;
    font-weight:700;
    margin-bottom:14px;
}

.guide-text{
    color:rgba(255,255,255,.88);
    font-size:15px;
}

.highlight{
    color:#ffd54f;
    font-weight:bold;
}

.example{
    margin-top:14px;
    color:#4ade80;
    font-weight:bold;
    font-size:18px;
}

.big-domain{
    margin-top:12px;
    color:#60a5fa;
    font-weight:bold;
    font-size:24px;
    word-break:break-all;
}

.notice{
    color:#fca5a5;
    font-size:14px;
    margin-bottom:24px;
    line-height:1.7;
}

.links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.link{
    text-decoration:none;

    background:rgba(255,255,255,.15);

    border:1px solid rgba(255,255,255,.15);

    color:#fff;

    padding:16px;

    border-radius:14px;

    font-size:20px;
    font-weight:600;

    transition:.25s;
}

.link:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,.25);
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.contact{
    margin-top:35px;
    padding-top:20px;
    border-top:1px solid rgba(255,255,255,.15);
}

.contact a{
    display:block;
    margin-top:12px;

    color:#cbd5e1;
    text-decoration:none;

    transition:.2s;
}

.contact a:hover{
    color:#fff;
}

.footer{
    margin-top:25px;
    color:rgba(255,255,255,.5);
    font-size:13px;
}

@media(max-width:600px){

    .card{
        padding:30px 20px;
    }

    .logo{
        font-size:32px;
    }

    .guide-title{
        font-size:18px;
    }

    .link{
        font-size:17px;
        padding:14px;
    }

    .big-domain{
        font-size:20px;
    }

}
</style>
</head>

<body>

<div class="card">

    <div class="logo">
        Muacloud
    </div>

    <div class="guide-box">

        <div class="guide-title">
            域名每个月都会变化
        </div>

        <div class="guide-text">

            访问规则：

            <br><br>

            <span class="highlight">
                当前年月 + .域名
            </span>

            <div class="example">
                当前时间：
                <span id="current-date"></span>
            </div>

            <div class="big-domain">
                <span id="example-prefix"></span>.muacloud.vip
            </div>

        </div>

    </div>

    <div class="notice">
        请使用“当前年月”访问最新地址
        <br>
        每月域名前缀都会自动更新，请勿收藏旧链接
        <br>
        右下角有在线客服 消息可能有延迟
    </div>

    <div class="links" id="link-container">
        正在加载最新地址...
    </div>

    <div class="contact">

        <a href="https://t.me/muacloud_admina" target="_blank">
            Telegram：@muacloud_admina
        </a>

        <a href="mailto:muacloud.cloud@gmail.com">
            邮箱：muacloud.cloud@gmail.com
        </a>

    </div>

    <div class="footer">
        © 2026 Muacloud
    </div>

</div>

<script>
(function() {

    const now = new Date();

    const year = now.getFullYear().toString().slice(-2);

    const month = (now.getMonth() + 1)
        .toString()
        .padStart(2,'0');

    const prefix = year + month;

    document.getElementById('current-date').innerText =
        `${year}年${month}月`;

    document.getElementById('example-prefix').innerText =
        prefix;

    const baseDomains = [
        "12o.ooo",
        "muacloud.vip",
        "muacloud.xyz",
        "4iox.com"
    ];

    const container = document.getElementById('link-container');

    container.innerHTML = '';

    baseDomains.forEach(domain => {

        const fullUrl = `https://${prefix}.${domain}`;

        const a = document.createElement('a');

        a.href = fullUrl;

        a.className = 'link';

        a.target = '_blank';

        a.innerText = `${prefix}.${domain}`;

        container.appendChild(a);

    });

})();
</script>

</body>
</html>
